<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icon.png" type="image/png">
    <link rel="stylesheet" href="../static/style.css">
    <title>Submit a report</title>
</head>
<body>
    <div id="cheading"></div>
    <h3>Feedback</h3>
    <p>If something isn't working quite right or you have some feedback, let me know here!</p> <hr>
    <form action="/reportSubmit" method="post">
    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name"><br>
    <label for="message">Report an issue here:</label><br>
    <textarea id="message" name="message" rows="4" cols="50"></textarea><br>
    <input type="submit" value="Submit" class="buttonthing">
    </form>
    <script src="../static/index.js"></script>
    <script>
        fetch("../static/banner.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("cheading").innerHTML = html;
        });
    </script>
</body>
</html>
