<!doctype html>
<html>
  <head>
    {% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icon.png" type="image/png">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% endblock %}
  </head>
  <body>
    <div id="heading" class="navbar">
        <h1>Malcolm's Website</h1> 
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <a href="/"><button class="buttonthing">Home</button></a> <a href="/status"> <button class="buttonthing">Status</button></a> <a href="/blog"><button class="buttonthing">Blog</button></a>
            <a href="/guest"><button class="buttonthing" >Guest Book</button></a><a href="/games"><button class="buttonthing" >Games</button></a>
            <a href="/empty"><button class="buttonthing" >Links</button></a> <a href="/faqs"><button class="buttonthing" >FAQs</button></a>
            {% if session['user'] == 'malcolm' %}
            <a href="/admin"><button class="buttonthing">Admin</button></a>
            {% endif %}
        </div>
        <div class="loginsign">  
            {% if 'user' in session %}
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <span class="role-{{ session.get('role', 'user') }}">{{ session['user'] }}</span>
                    <a href="/profile/{{ session.get('user') }}"><button class="buttonthing">Profile</button></a>
                </div>
            {% else %}
            <a href="/login"> <button class="buttonthing">Login</button></a> <a href="/register"><button class="buttonthing">Register</button></a>
            {% endif %}
        </div>
    </div>
    <hr>
    <div id="content">{% block content %}{% endblock %}</div>
  </body>
</html>
